<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drużyna – MKS Zachód Sobótka</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #fff; }
    .top-nav-link { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px; white-space: nowrap; opacity: 0.9; cursor: pointer; text-decoration: none; }
    .top-nav-link:hover { opacity: 1; color: #F5C400; }
    .nav-active { color: #F5C400 !important; }
    .section-title { font-size: 22px; font-weight: 900; text-transform: uppercase; color: #111; border-left: 4px solid #003DA5; padding-left: 12px; margin-bottom: 24px; }
    .player-card { background: #1a1a1a; overflow: hidden; position: relative; cursor: pointer; }
    .player-card:hover .player-overlay { opacity: 1; }
    .player-overlay { position: absolute; inset: 0; background: rgba(0,61,165,0.15); opacity: 0; transition: opacity 0.2s; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="bg-black border-b border-gray-800" style="min-height:40px;">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-3" style="height:40px;">
    <a href="index.html" class="flex items-center gap-2 flex-shrink-0" style="text-decoration:none;">
      <img src="logo2.jpg" alt="MKS Zachód Sobótka" style="height:36px;width:auto;object-fit:contain;" />
      <div>
        <div style="font-size:11px;font-weight:900;color:#fff;letter-spacing:1px;line-height:1;">MKS ZACHÓD</div>
        <div style="font-size:7px;color:#F5C400;letter-spacing:2px;font-weight:700;">SOBÓTKA</div>
      </div>
    </a>
    <nav class="flex items-center gap-1 overflow-x-auto">
      <a href="aktualnosci.html" class="top-nav-link">Aktualności</a>
      <a href="o-nas.html" class="top-nav-link">O nas</a>
      <a href="druzyna.html" class="top-nav-link nav-active">Drużyna</a>
      <a href="terminarz.html" class="top-nav-link">Terminarz</a>
      <a href="kontakt.html" class="top-nav-link">Kontakt</a>
    </nav>
    <div class="flex-shrink-0"></div>
  </div>
</div>

<!-- PAGE HEADER -->
<div style="background:linear-gradient(135deg,#001a4a,#003DA5);padding:40px 16px;">
  <div class="max-w-6xl mx-auto">
    <div style="font-size:11px;color:#F5C400;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;">MKS Zachód Sobótka</div>
    <h1 style="font-size:36px;font-weight:900;color:#fff;letter-spacing:1px;">Pierwsza drużyna · Sezon 2025/26</h1>
  </div>
</div>

<!-- SZTAB -->
<section style="padding:40px 16px;background:#f8f8f8;border-bottom:1px solid #eee;">
  <div class="max-w-6xl mx-auto">
    <div class="section-title">Sztab szkoleniowy</div>
    <div id="sztab-container" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;"></div>
  </div>
</section>

<!-- ZAWODNICY -->
<section style="padding:40px 16px;background:#fff;">
  <div class="max-w-6xl mx-auto" id="zawodnicy-container"></div>
</section>

<!-- FOOTER -->
<footer style="background:#0a0a0a;padding:32px 16px;border-top:1px solid #1a1a1a;">
  <div class="max-w-6xl mx-auto" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="logo2.jpg" alt="MKS Zachód Sobótka" style="height:36px;width:auto;object-fit:contain;" />
      <div>
        <div style="font-size:12px;font-weight:900;color:#fff;">MKS ZACHÓD SOBÓTKA</div>
        <div style="font-size:9px;color:#F5C400;">Stadion Sobótka, ul. Polna · od 1998</div>
      </div>
    </div>
    <div style="font-size:10px;color:#444;">© 2026 Miejski Klub Sportowy Zachód Sobótka</div>
  </div>
</footer>

<script>
fetch('/data/druzyna.json')
  .then(r => r.json())
  .then(data => {
    // SZTAB
    const sztabEl = document.getElementById('sztab-container');
    sztabEl.innerHTML = data.sztab.map(s => `
      <div style="background:#fff;border:1px solid #e5e5e5;padding:20px;display:flex;align-items:center;gap:16px;">
        <div style="width:48px;height:48px;background:#003DA5;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:18px;color:#F5C400;font-weight:900;">${s.inicjal}</span>
        </div>
        <div>
          <div style="font-size:9px;color:#003DA5;text-transform:uppercase;letter-spacing:1px;font-weight:700;">${s.rola}</div>
          <div style="font-size:14px;font-weight:900;color:#111;">${s.imie}</div>
        </div>
      </div>
    `).join('');

    // ZAWODNICY – grupuj po pozycji (pierwsze słowo)
    const grupy = { 'Bramkarz': [], 'Obrońca': [], 'Pomocnik': [], 'Napastnik': [] };
    data.zawodnicy.forEach(z => {
      const klucz = z.pozycja.split(' ')[0];
      if (grupy[klucz]) grupy[klucz].push(z);
      else grupy['Napastnik'].push(z);
    });

    const nazwy = { 'Bramkarz': 'Bramkarze', 'Obrońca': 'Obrońcy', 'Pomocnik': 'Pomocnicy', 'Napastnik': 'Napastnicy' };

    const zawodnicyEl = document.getElementById('zawodnicy-container');
    zawodnicyEl.innerHTML = Object.entries(grupy).filter(([,lista]) => lista.length > 0).map(([poz, lista]) => `
      <div class="section-title" style="margin-top:${poz==='Bramkarz'?'0':'40px'};">${nazwy[poz]}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;">
        ${lista.map(z => {
          const jerseyColor = z.koszulka === 'yellow' ? '#F5C400' : '#003DA5';
          return `
            <div class="player-card">
              <div style="height:200px;background:linear-gradient(180deg,#001a4a,#000d2a);display:flex;align-items:flex-end;justify-content:center;position:relative;">
                <div class="player-overlay"></div>
                <div style="font-size:56px;font-weight:900;color:rgba(245,196,0,0.1);position:absolute;top:4px;left:8px;line-height:1;">${z.numer}</div>
                <svg width="70" height="130" viewBox="0 0 80 180" style="position:absolute;bottom:0;opacity:0.9;">
                  <ellipse cx="40" cy="25" rx="14" ry="17" fill="#1a2a3a"/>
                  <path d="M22,45 Q40,36 58,45 L62,115 L53,115 L48,78 L32,78 L27,115 L18,115 Z" fill="${jerseyColor}"/>
                  <path d="M53,115 L57,158 L48,158 L44,130 L36,130 L32,158 L23,158 L27,115 Z" fill="#111"/>
                </svg>
              </div>
              <div style="background:#1a1a1a;padding:10px;border-top:2px solid #F5C400;">
                <div style="font-size:8px;color:#F5C400;font-weight:700;text-transform:uppercase;letter-spacing:1px;">${z.pozycja}</div>
                <div style="font-size:13px;font-weight:900;color:#fff;margin-top:2px;">${z.imie}</div>
              </div>
            </div>`;
        }).join('')}
      </div>
    `).join('');
  })
  .catch(() => {
    document.getElementById('zawodnicy-container').innerHTML = '<p style="color:#aaa;padding:40px;text-align:center;">Nie można załadować danych drużyny.</p>';
  });
</script>

</body>
</html>
