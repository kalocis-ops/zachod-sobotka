<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aktualności – MKS Zachód Sobótka</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #fff; }
    .top-nav-link { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px; white-space: nowrap; opacity: 0.9; cursor: pointer; text-decoration: none; }
    .top-nav-link:hover { opacity: 1; color: #F5C400; }
    .nav-active { color: #F5C400 !important; }
    .club-btn { background: #003DA5; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 18px; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
    .club-btn:hover { background: #002d80; }
    .tag-blue { background: #003DA5; color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; display: inline-block; }
    .tag-yellow { background: #F5C400; color: #111; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; display: inline-block; }
    .section-title { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; color: #111; border-left: 4px solid #003DA5; padding-left: 10px; margin-bottom: 24px; }
    footer a { text-decoration: none; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="bg-black border-b border-gray-800" style="min-height:40px;">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-3" style="height:40px;">
    <a href="index.html" class="flex items-center gap-2 flex-shrink-0" style="text-decoration:none;">
      <img src="logo2.jpg" alt="MKS Zachód Sobótka" style="height:36px;width:auto;object-fit:contain;" />
      <div>
        <div style="font-size:11px;font-weight:900;color:#fff;letter-spacing:1px;line-height:1;">MKS ZACHÓD</div>
        <div style="font-size:7px;color:#F5C400;letter-spacing:2px;font-weight:700;">SOBÓTKA</div>
      </div>
    </a>
    <nav class="flex items-center gap-1 overflow-x-auto">
      <a href="aktualnosci.html" class="top-nav-link nav-active">Aktualności</a>
      <a href="o-nas.html" class="top-nav-link">O nas</a>
      <a href="druzyna.html" class="top-nav-link">Drużyna</a>
      <a href="terminarz.html" class="top-nav-link">Terminarz</a>
      <a href="kontakt.html" class="top-nav-link">Kontakt</a>
    </nav>
    <div class="flex-shrink-0"></div>
  </div>
</div>

<!-- PAGE HEADER -->
<div style="background:linear-gradient(135deg,#001a4a,#003DA5);padding:40px 16px;">
  <div class="max-w-6xl mx-auto">
    <div style="font-size:11px;color:#F5C400;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;">MKS Zachód Sobótka</div>
    <h1 style="font-size:36px;font-weight:900;color:#fff;letter-spacing:1px;">Aktualności</h1>
  </div>
</div>

<!-- AKTUALNOŚCI -->
<section style="padding:48px 16px;background:#f8f8f8;">
  <div class="max-w-6xl mx-auto" id="news-container">
    <div style="text-align:center;padding:40px;color:#aaa;">Ładowanie aktualności…</div>
  </div>
</section>

<script>
fetch('/data/aktualnosci.json')
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById('news-container');
    if (!data.wpisy || data.wpisy.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#aaa;padding:40px;">Brak aktualności.</p>';
      return;
    }
    container.innerHTML = data.wpisy.map(w => {
      const tagClass = w.tagColor === 'blue' ? 'tag-blue' : 'tag-yellow';
      const scoreHtml = w.score ? `
        <div style="position:absolute;bottom:12px;left:12px;right:12px;">
          <div style="font-size:28px;font-weight:900;color:#F5C400;line-height:1;">${w.score}</div>
          ${w.scoreLabel ? `<div style="font-size:12px;color:#fff;margin-top:4px;">${w.scoreLabel}</div>` : ''}
        </div>` : '';
      const p2 = w.content2 ? `<p style="font-size:13px;color:#555;line-height:1.8;margin-bottom:16px;">${w.content2}</p>` : '';
      const p3 = w.content3 ? `<p style="font-size:13px;color:#555;line-height:1.8;margin-bottom:20px;">${w.content3}</p>` : '';
      const t1 = w.tag1 ? `<span class="tag-yellow">${w.tag1}</span>` : '';
      const t2 = w.tag2 ? `<span class="tag-blue" style="margin-left:6px;">${w.tag2}</span>` : '';
      return `
        <article style="background:#fff;border:1px solid #e5e5e5;margin-bottom:24px;display:grid;grid-template-columns:320px 1fr;overflow:hidden;">
          <div style="background:linear-gradient(160deg,#001a4a,#003DA5);min-height:220px;position:relative;">
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);"></div>
            <span class="${tagClass}" style="position:absolute;top:12px;left:12px;">${w.tag}</span>
            ${scoreHtml}
          </div>
          <div style="padding:24px;">
            <div style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">${w.date}${w.location ? ' · ' + w.location : ''}</div>
            <h2 style="font-size:20px;font-weight:900;color:#111;margin-bottom:12px;line-height:1.3;">${w.title}</h2>
            <p style="font-size:13px;color:#555;line-height:1.8;margin-bottom:16px;">${w.content1}</p>
            ${p2}${p3}${t1}${t2}
          </div>
        </article>`;
    }).join('');
  })
  .catch(() => {
    document.getElementById('news-container').innerHTML = '<p style="text-align:center;color:#aaa;padding:40px;">Nie można załadować aktualności.</p>';
  });
</script>

<!-- FOOTER -->
<footer style="background:#0a0a0a;padding:32px 16px;border-top:1px solid #1a1a1a;">
  <div class="max-w-6xl mx-auto" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="logo2.jpg" alt="MKS Zachód Sobótka" style="height:36px;width:auto;object-fit:contain;" />
      <div>
        <div style="font-size:12px;font-weight:900;color:#fff;">MKS ZACHÓD SOBÓTKA</div>
        <div style="font-size:9px;color:#F5C400;">Stadion Sobótka, ul. Polna · od 1998</div>
      </div>
    </div>
    <div style="font-size:10px;color:#444;">© 2026 Miejski Klub Sportowy Zachód Sobótka</div>
  </div>
</footer>

</body>
</html>
